- name: Olivia A. Asher
  pronouns: 
  photo: Asher_Olivia_2025.jpg
  info: Olivia A. Asher is a 5th-Year PhD Candidate and Presidential Fellow in the Institute of Bioinformatics at the University of Georgia. Her research focuses on Arbuscular Mycorrhizal Fungi (AMF), a group of fungi that live in ~80% of land plants and can be used to promote plant growth. Olivia is also a Department of Energy Computational Science Graduate Alumna. As part of this fellowship, Olivia conducted research at Los Alamos National Laboratory on Mollicutes-Related Endobacteria and on optimizing enzymes for digesting plastics as part of the Bio-Optimized Technologies to keep Thermoplastics out of Landfills and the Environment (BOTTLE™) project in the summer of 2022. In her free time, Olivia has taken on leadership roles in the Coalition of Athens Scientists, University of Georgia's Graduate Pride organization, the Bioinformatics Graduate Student Association, and the Plant Center Spring Symposium Planning Committee. Public service is one of Olivia's core values, and she regularly volunteers with local organizations including Science for Georgia, Campus Kitchen, Concrete Jungle, and Sandy Creek Nature Center. Her hobbies include liminal space photography and observing turtles.
